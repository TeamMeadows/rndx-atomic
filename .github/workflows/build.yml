on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build shaders
        shell: pwsh
        run: |
          cd shaders
          python build.py

      - name: Bundle RNDX
        uses: TeamMeadows/bundler@v0.2.0
        with:
          name: rndx
          type: package

      - name: Pack bundle into zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Compress-Archive -Path dist/rndx -DestinationPath artifacts/rndx-release.zip

      - name: Publish to releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/rndx-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}