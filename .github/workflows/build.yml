on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build shaders
        shell: pwsh
        run: |
          cd shaders
          python build.py

      - name: Pack bundle into zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/rndx
          Copy-Item lua artifacts/rndx -Recurse -Force
          Copy-Item LICENSE artifacts/rndx
          Compress-Archive -Path artifacts/rndx -DestinationPath artifacts/rndx-release.zip

      - name: Publish to releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/rndx-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}